services:

  auth:
    build:
      context: ./backend/NutriHubAuth
      dockerfile: Dockerfile
    ports:
      - "5225:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  patient:
    build:
      context: ./backend/NutriHubPatient
      dockerfile: Dockerfile
    ports:
      - "5081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  clinic:
    build:
      context: ./backend/NutriHubClinic
      dockerfile: Dockerfile
    ports:
      - "5249:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
