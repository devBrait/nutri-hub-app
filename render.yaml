services:

  - type: web
    name: nutrihub-auth
    runtime: docker
    dockerfilePath: ./backend/NutriHubAuth/Dockerfile
    dockerContext: ./backend/NutriHubAuth
    branch: main
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_HTTP_PORTS
        value: "10000"
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Secret
        sync: false
      - key: Jwt__Issuer
        value: NutriHubAuth
      - key: Jwt__Audience
        value: NutriHub
      - key: Jwt__ExpiresInMinutes
        value: "60"

  - type: web
    name: nutrihub-patient
    runtime: docker
    dockerfilePath: ./backend/NutriHubPatient/Dockerfile
    dockerContext: ./backend/NutriHubPatient
    branch: main
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_HTTP_PORTS
        value: "10000"
      - key: ConnectionStrings__DefaultConnection
        sync: false

  - type: web
    name: nutrihub-clinic
    runtime: docker
    dockerfilePath: ./backend/NutriHubClinic/Dockerfile
    dockerContext: ./backend/NutriHubClinic
    branch: main
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_HTTP_PORTS
        value: "10000"
      - key: ConnectionStrings__DefaultConnection
        sync: false
