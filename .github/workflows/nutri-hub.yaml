name: NutriHub CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  # ── FRONTEND ────────────────────────────────────────────────────────────────

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend


  check-frontend:
    name: Check Frontend
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Biome CI
        run: npx biome ci .
        working-directory: ./frontend

      - name: Security Audit
        run: npm audit --audit-level=high
        working-directory: ./frontend


  # ── AUTH ────────────────────────────────────────────────────────────────────

  build-auth:
    name: Build Auth
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-auth-${{ hashFiles('backend/NutriHubAuth/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-auth-

      - run: dotnet restore backend/NutriHubAuth/NutriHubAuth.slnx
      - run: dotnet build backend/NutriHubAuth/NutriHubAuth.slnx --configuration Release --no-restore


  test-auth:
    name: Test Auth
    runs-on: ubuntu-latest
    needs: build-auth

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-auth-${{ hashFiles('backend/NutriHubAuth/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-auth-

      - name: Restore Tests
        run: dotnet restore backend/NutriHubAuth/tests/NutriHubAuth.Tests/NutriHubAuth.Tests.csproj

      - name: Run Tests
        run: dotnet test backend/NutriHubAuth/tests/NutriHubAuth.Tests/NutriHubAuth.Tests.csproj --configuration Release --no-restore --verbosity normal


  security-scan-auth:
    name: Security Scan Auth
    runs-on: ubuntu-latest
    needs: build-auth

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-auth-${{ hashFiles('backend/NutriHubAuth/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-auth-

      - name: Restore
        run: dotnet restore backend/NutriHubAuth/NutriHubAuth.slnx

      - name: Scan
        run: |
          result=$(dotnet list backend/NutriHubAuth/NutriHubAuth.slnx package --vulnerable --include-transitive)
          echo "$result"
          ! echo "$result" | grep -q "has the following vulnerable packages"


  # ── PATIENT ─────────────────────────────────────────────────────────────────

  build-patient:
    name: Build Patient
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-patient-${{ hashFiles('backend/NutriHubPatient/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-patient-

      - run: dotnet restore backend/NutriHubPatient/NutriHubPatient.slnx
      - run: dotnet build backend/NutriHubPatient/NutriHubPatient.slnx --configuration Release --no-restore


  test-patient:
    name: Test Patient
    runs-on: ubuntu-latest
    needs: build-patient

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-patient-${{ hashFiles('backend/NutriHubPatient/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-patient-

      - name: Restore Tests
        run: dotnet restore backend/NutriHubPatient/tests/NutriHubPatient.Tests/NutriHubPatient.Tests.csproj

      - name: Run Tests
        run: dotnet test backend/NutriHubPatient/tests/NutriHubPatient.Tests/NutriHubPatient.Tests.csproj --configuration Release --no-restore --verbosity normal


  security-scan-patient:
    name: Security Scan Patient
    runs-on: ubuntu-latest
    needs: build-patient

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-patient-${{ hashFiles('backend/NutriHubPatient/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-patient-

      - name: Restore
        run: dotnet restore backend/NutriHubPatient/NutriHubPatient.slnx

      - name: Scan
        run: |
          result=$(dotnet list backend/NutriHubPatient/NutriHubPatient.slnx package --vulnerable --include-transitive)
          echo "$result"
          ! echo "$result" | grep -q "has the following vulnerable packages"


  # ── CLINIC ──────────────────────────────────────────────────────────────────

  build-clinic:
    name: Build Clinic
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-clinic-${{ hashFiles('backend/NutriHubClinic/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-clinic-

      - run: dotnet restore backend/NutriHubClinic/NutriHubClinic.slnx
      - run: dotnet build backend/NutriHubClinic/NutriHubClinic.slnx --configuration Release --no-restore


  test-clinic:
    name: Test Clinic
    runs-on: ubuntu-latest
    needs: build-clinic

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-clinic-${{ hashFiles('backend/NutriHubClinic/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-clinic-

      - name: Restore Tests
        run: dotnet restore backend/NutriHubClinic/tests/NutriHubClinic.Tests/NutriHubClinic.Tests.csproj

      - name: Run Tests
        run: dotnet test backend/NutriHubClinic/tests/NutriHubClinic.Tests/NutriHubClinic.Tests.csproj --configuration Release --no-restore --verbosity normal


  security-scan-clinic:
    name: Security Scan Clinic
    runs-on: ubuntu-latest
    needs: build-clinic

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-clinic-${{ hashFiles('backend/NutriHubClinic/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-clinic-

      - name: Restore
        run: dotnet restore backend/NutriHubClinic/NutriHubClinic.slnx

      - name: Scan
        run: |
          result=$(dotnet list backend/NutriHubClinic/NutriHubClinic.slnx package --vulnerable --include-transitive)
          echo "$result"
          ! echo "$result" | grep -q "has the following vulnerable packages"
